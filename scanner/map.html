function render(){const data=filtered(),sort=document.getElementById('sort').value,prioritizeLow=document.getElementById('prioritize-low').checked;data.sort((a,b)=>{if(prioritizeLow&&isLowParticipants(a)!==isLowParticipants(b))return isLowParticipants(a)?-1:1;if(sort==='level')return b.level-a.level;if(sort==='remain-desc')return remainMs(b)-remainMs(a);if(sort==='discovered')return (+a.first_seen||Number.MAX_SAFE_INTEGER)-(+b.first_seen||Number.MAX_SAFE_INTEGER);if(sort==='discovered-desc')return (+b.first_seen||0)-(+a.first_seen||0);return remainMs(a)-remainMs(b)});const live=new Set(data.map(m=>m.id));for(const id in markers)if(!live.has(id)){map.removeLayer(markers[id]);delete markers[id]}for(const m of data){if(!markers[m.id])markers[m.id]=L.marker([m.lat,m.lng],{icon:mushIconFor(m)}).addTo(map);markers[m.id].setIcon(mushIconFor(m));markers[m.id].bindPopup(popup(m))}document.getElementById('count').textContent=data.length;document.getElementById('summary').innerHTML=`顯示 <strong>${data.length}</strong> / ${all.length} 個未過期蘑菇`;document.getElementById('mush-list').innerHTML=data.length?data.map(m=>`<article class="item${isLowParticipants(m)?' item-low-participants':''}" style="border-left-color:${levelColor(+m.level)}" onclick="focusM('${esc(m.id)}')"><div class="item-head"><div class="item-title">🍄 ${esc(levelName(m.level))}・${esc(typeName(m.type))}</div><div class="item-actions"><button class="copy-btn" onclick="event.stopPropagation();copyGps(${m.lat},${m.lng})">複製 GPS</button><button class="copy-btn" onclick="event.stopPropagation();copyMushInfo(${m.level},${m.type},${m.lat},${m.lng})">複製資訊</button></div></div><div class="item-meta">⏳ ${remain(m)}<br>📍 ${esc(cityName(m))}・${(+m.lat).toFixed(6)}, ${(+m.lng).toFixed(6)}</div></article>`).join(''):'<div class="empty">🌱 沒有符合條件的蘑菇</div>'}
function focusM(id){const m=all.find(x=>x.id===id);if(m){map.setView([m.lat,m.lng],Math.max(map.getZoom(),15));markers[id]?.openPopup();if(innerWidth<761)scrollTo({top:0,behavior:'smooth'})}}
function updateTypes(){const vals=[...new Set(all.map(m=>String(m.type)))].sort((a,b)=>+a-+b);if(!typesInitialized){vals.forEach(v=>selectedTypes.add(v));typesInitialized=true}else vals.forEach(v=>{if(!document.querySelector(`[data-type="${v}"]`))selectedTypes.add(v)});document.getElementById('type-checks').innerHTML=vals.map(v=>`<label class="chip"><input type="checkbox" data-type="${v}" ${selectedTypes.has(v)?'checked':''}> ${esc(typeName(v))}</label>`).join('');document.querySelectorAll('[data-type]').forEach(el=>el.addEventListener('change',()=>{el.checked?selectedTypes.add(el.dataset.type):selectedTypes.delete(el.dataset.type);render()}))}
async function refresh(){try{const d=await(await fetch('/api/mushrooms?_='+Date.now())).json();all=d.mushrooms||[];document.getElementById('upd').textContent='更新：'+new Date(d.updated*1000).toLocaleTimeString();const s=d.status||{},place=s.city?(s.country?`${s.country}-${s.city}`:s.city):'';document.getElementById('scan').innerHTML=(s.running?`掃描中 ${s.point||0}/${s.total||0}`:'目前未掃描')+(place?`<br>🏙️ 目前掃描：${esc(place)} ${s.city_index||1}/${s.city_total||1}`:'')+`<br>本點 +${s.new_at_point||0}・累計 ${s.captured_total||0}`;updateTypes();render();if(!fitted&&all.length){map.fitBounds(all.map(m=>[m.lat,m.lng]),{padding:[35,35]});fitted=true}}catch(e){document.getElementById('upd').textContent='暫時無法取得資料'}}
function setAutoRefresh(){clearInterval(refreshTimer);if(document.getElementById('auto-refresh').checked)refreshTimer=setInterval(refresh,20000)}
['lv1','lv2','lv3','lv4','sort','prioritize-low','search'].forEach(id=>document.getElementById(id).addEventListener('input',render));document.getElementById('auto-refresh').addEventListener('change',setAutoRefresh);document.getElementById('refresh-now').addEventListener('click',refresh);document.getElementById('types-all').addEventListener('click',()=>{document.querySelectorAll('[data-type]').forEach(x=>{x.checked=true;selectedTypes.add(x.dataset.type)});render()});document.getElementById('types-none').addEventListener('click',()=>{selectedTypes.clear();document.querySelectorAll('[data-type]').forEach(x=>x.checked=false);render()});refresh();setAutoRefresh();setInterval(()=>all.length&&render(),30000);
</script></body></html>
